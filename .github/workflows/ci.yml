name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: api/package-lock.json
      - run: npm ci
        working-directory: api
      - run: npm run lint
        working-directory: api

  test:
    name: Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node: ["20", "22"]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: shoplite_test
          POSTGRES_USER: shoplite
          POSTGRES_PASSWORD: shoplite_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
          cache-dependency-path: api/package-lock.json
      - name: Install deps
        run: npm ci
        working-directory: api
      - name: Init DB schema
        run: |
          PGPASSWORD=shoplite_password psql -h localhost -U shoplite -d shoplite_test -f database/init.sql
      - name: Run tests with coverage
        run: npm test -- --coverage --coverageThreshold='{"global":{"lines":80}}'
        working-directory: api
        env:
          DATABASE_URL: postgres://shoplite:shoplite_password@localhost:5432/shoplite_test
          NODE_ENV: test
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node-${{ matrix.node }}
          path: api/coverage/

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: api/package-lock.json
      - run: npm ci
        working-directory: api
      - run: npm audit --audit-level=high
        working-directory: api
      - run: npm outdated || true
        working-directory: api

  build-docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t shoplite-api:ci ./api
      - name: Build frontend image
        run: docker build -t shoplite-frontend:ci ./frontend
      - name: Inspect API image size
        run: docker images shoplite-api:ci
      - name: Trivy scan API
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: shoplite-api:ci
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

  docker-compose-check:
    name: Docker Compose validation
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose config
        run: |
          cp .env.example .env
          docker compose config
      - name: Validate staging config
        run: docker compose -f docker-compose.yml -f docker-compose.staging.yml config
