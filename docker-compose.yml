services:
  db:
    image: postgres:16-alpine
    container_name: shoplite_db
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shoplite}
      POSTGRES_USER: ${POSTGRES_USER:-shoplite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shoplite_password}
    volumes:
      - shoplite_pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - shoplite_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  api:
    build: ./api
    container_name: shoplite_api
    image: shoplite-api:${APP_VERSION:-latest}
    env_file: .env
    environment:
      API_PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-shoplite}:${POSTGRES_PASSWORD:-shoplite_password}@db:5432/${POSTGRES_DB:-shoplite}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_VERSION: ${APP_VERSION:-dev}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - shoplite_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  frontend:
    build: ./frontend
    container_name: shoplite_frontend
    networks:
      - shoplite_net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  proxy:
    image: nginx:1.27-alpine
    container_name: shoplite_proxy
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - shoplite_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  shoplite_pgdata:
    name: shoplite_pgdata

networks:
  shoplite_net:
    driver: bridge
